<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BHROMAON</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Aleo:ital,wght@0,100..900;1,100..900&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />

    <!-- font awsome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Google Icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />

    <!-- Animation Library -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />

    <!--  normalize.css -->
    <link rel="stylesheet" href="styles/normalize.css" />

    <!-- index.css -->
    <link rel="stylesheet" href="/styles/index.css" />
  </head>
  <body>
    <header class="box">
      <div class="box__title">
        <h1 class="animate__animated animate__heartBeat">Bhromaon</h1>
        <h6>Safe Travel Anywhere</h6>
      </div>
      <div class="box__search">
        <input type="text" placeholder="Search Your Travel Destination" />
        <button type="submit">Search <i class="fa fa-search"></i></button>
      </div>

      <div class="box__scroll">
        <p>Scroll Down</p>
        <span class="material-symbols-outlined"> keyboard_arrow_down </span>
      </div>
    </header>
  </body>
</html>
