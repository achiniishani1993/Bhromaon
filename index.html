<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BHROMAON</title>
    <!-- Font Awesome CDN link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!-- google font link -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=keyboard_arrow_down"
    />

    <!-- linked normalize.css -->
    <link rel="stylesheet" href="styles/normalize.css" />
    <!-- linked index.css -->
    <link rel="stylesheet" href="/styles/index.css" />
  </head>
  <body>
    <header class="box">
      <div class="box__title">
        <h1>Bhromaon</h1>
        <h6>Safe Travel Anywhere</h6>
      </div>
      <div class="box__search">
        <input type="text" placeholder="Search Your Travel Destination" />
        <button type="submit">Search <i class="fa fa-search"></i></button>
      </div>

      <div class="box__scroll">
        <p>Scroll Down</p>
        <span class="material-symbols-outlined"> keyboard_arrow_down </span>
      </div>
    </header>
  </body>
</html>
